BriteConfig

BeginModel
	Name = 5		 #Top Down = 5
	edgeConn = 2		 #Random=1, Smallest Nonleaf = 2, Smallest Deg = 3, k-Degree=4
	k = -1			 #Only needed if edgeConn is set to K-Degree, otherwise use -1
	BWInter = 1		 #Constant = 1, Uniform =2, HeavyTailed = 3, Exponential =4
	BWInterMin = 10.0
	BWInterMax = 1024.0
	BWIntra = 3		 #Constant = 1, Uniform =2, HeavyTailed = 3, Exponential =4
	BWIntraMin = 10.0
	BWIntraMax = 1024.0
EndModel

BeginModel
	Name =  4		 #AS Barabasi = 4
	N = 2			 #Number of AS = 1 (single autonomous system)
	HS = 5000		 #Size of main plane (width)
	LS = 5000		 #Size of main plane (height)
	NodePlacement = 1	 #Random = 1, Heavy Tailed = 2
	m = 1			 #Number of neighboring node each new node connects to.
	BWDist = 1		 #Constant = 1, Uniform =2, HeavyTailed = 3, Exponential =4
	BWMin = 10.0		 #CHANGED: Set minimum bandwidth for AS links
	BWMax = 1024.0		 #CHANGED: Set maximum bandwidth for AS links
EndModel

BeginModel
	Name =  1		 #Router Waxman = 1 (single AS, router-level)
	N = 50
	HS = 5000		 #Size of main plane (width)
	LS = 5000		 #Size of main plane (height)
	NodePlacement = 2	 #Random = 1, Heavy Tailed = 2
	GrowthType = 1		 #Incremental = 1, All = 2
	m = 2			 #CHANGED: Number of connections per new node (was 1, now 2 for better connectivity)
	alpha = 0.15		 #CHANGED: Waxman alpha (lower = fewer long links)
	beta = 0.2		 #CHANGED: Waxman beta (controls link density)
	BWDist = 1		 #Constant = 1, Uniform =2, HeavyTailed = 3, Exponential =4
	BWMin = 10.0		 #CHANGED: Minimum bandwidth per link (Mbps)
	BWMax = 100.0		 #CHANGED: Maximum bandwidth per link (Mbps)
EndModel

BeginOutput 			#**At least one of these options should have value 1**
	BRITE = 1		#0 = Do not save as BRITE, 1 = save as BRITE.
	OTTER = 0		#0 = Do not visualize with Otter, 1 = Visualize
EndOutput